name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  calc-sync:
    name: Calculation Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Kotlin <-> JS calculation parity
        run: node scripts/verify-sync.js

  android:
    name: Android Build + Test + Lint
    runs-on: ubuntu-latest
    needs: calc-sync
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 14

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  web-bootstrap-check:
    name: Web Bootstrap Check
    runs-on: ubuntu-latest
    needs: calc-sync
    if: hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: TypeScript typecheck
        working-directory: web
        run: npm run typecheck

      - name: ESLint
        working-directory: web
        run: npm run lint
